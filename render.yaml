services:
  - type: web
    name: day5
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python seed.py && gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: day5-db
          property: connectionString

databases:
  - name: day5-db
    plan: free
