<!DOCTYPE html>
<html class="light" lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>{{ page_title }}</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>
<body class="bg-[#fff8f7] font-['Inter'] text-[#291716] antialiased">
  <nav class="sticky top-0 z-50 bg-white border-b-2 border-gray-100">
    <div class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto">
      <div class="flex items-center gap-6">
        <span class="inline-flex items-center gap-2 rounded border border-[#e7bdbb] bg-[#fff0ef] px-2 py-1">
          <img src="{{ url_for('static', filename='img/seoul-logo.svg') }}" alt="서울특별시 로고" class="h-7 w-auto" loading="eager"/>
          <span class="text-xs font-semibold text-[#2563eb]">서울특별시</span>
        </span>
        <a class="text-2xl font-black italic tracking-tighter text-[#EF233C]" href="{{ url_for('post_list') }}">RED_EDIT</a>
        <a class="text-slate-600 hover:text-[#EF233C] text-sm font-medium uppercase tracking-widest" href="{{ url_for('post_list') }}">Latest</a>
      </div>
      <a class="bg-[#EF233C] text-white px-6 py-2 text-xs font-semibold uppercase tracking-widest hover:opacity-90" href="{{ url_for('post_list') }}">Back to List</a>
    </div>
    <div class="h-1 bg-[#bb0026] w-1/3"></div>
  </nav>

  <main class="min-h-screen py-16">
    <div class="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-12 gap-6">
      <section class="md:col-span-8 max-w-[760px]">
        <div class="flex items-center gap-1 text-[#bb0026] text-xs font-semibold uppercase tracking-widest mb-8">
          <span class="material-symbols-outlined text-[16px]">edit_note</span>
          {% if submit_label == 'Update' %}Editing post{% else %}Drafting post{% endif %}
        </div>

        {% if error %}
        <div class="mb-6 border border-[#ba1a1a] bg-[#ffdad6] text-[#93000a] px-4 py-3 text-sm">
          {{ error }}
        </div>
        {% endif %}

        <form method="post" action="{{ form_action }}" enctype="multipart/form-data" class="flex flex-col gap-6">
          <div class="group border-b-2 border-[#e7bdbb] focus-within:border-[#bb0026] transition-colors">
            <input name="title" value="{{ title }}" required class="w-full bg-transparent border-none p-0 focus:ring-0 font-['Work_Sans'] text-[48px] leading-[1.1] tracking-[-0.02em] font-bold placeholder:text-[#926e6d]" placeholder="Enter post title..." type="text"/>
          </div>

          <div class="relative">
            <textarea name="content" required class="w-full min-h-[420px] bg-transparent border border-[#e7bdbb] p-4 focus:ring-0 focus:border-[#bb0026] font-['Inter'] text-[18px] leading-[1.6] text-[#5d3f3e] placeholder:text-[#926e6d] resize-y" placeholder="Tell your story...">{{ content }}</textarea>
          </div>

          <div class="flex flex-col gap-2">
            <label for="image" class="text-xs font-semibold uppercase tracking-widest text-[#596578]">사진 업로드</label>
            <input id="image" name="image" type="file" accept="image/png,image/jpeg,image/jpg,image/gif,image/webp" class="block w-full border border-[#e7bdbb] bg-white px-3 py-2 text-sm text-[#5d3f3e]"/>
            {% if image_path %}
            <img src="{% if image_path.startswith('http') %}{{ image_path }}{% else %}{{ url_for('static', filename=image_path) }}{% endif %}" alt="현재 업로드 이미지" class="h-28 w-auto border border-[#e7bdbb] bg-white"/>
            {% endif %}
          </div>

          <div class="flex items-center justify-end gap-3">
            <a class="px-5 py-2 border-2 border-[#bb0026] text-[#bb0026] text-xs font-semibold uppercase tracking-widest hover:bg-[#ffe9e7]" href="{{ url_for('post_list') }}">Cancel</a>
            <button type="submit" class="bg-[#EF233C] text-white px-6 py-2 text-xs font-semibold uppercase tracking-widest hover:opacity-90 active:scale-95 transition-all">
              {{ submit_label }}
            </button>
          </div>
        </form>
      </section>

      <aside class="md:col-span-4 flex flex-col gap-6">
        <section class="md:sticky md:top-24 self-start border border-[#e7bdbb] bg-white p-4">
          <p class="text-[10px] font-semibold uppercase tracking-widest text-slate-400 mb-2">Advertisement</p>
          <a href="#" class="block hover:opacity-95 transition-opacity">
            <img
              src="https://images.unsplash.com/photo-1556742502-ec7c0e9f34b1?auto=format&fit=crop&w=900&q=80"
              alt="광고 배너"
              class="w-full h-40 object-cover border border-[#e7bdbb]"
              loading="lazy"
            />
            <div class="mt-3">
              <h4 class="font-['Work_Sans'] text-lg font-bold leading-tight text-[#291716]">민원 처리 현황 실시간 안내</h4>
              <p class="mt-1 text-sm text-[#596578]">접수부터 처리까지 한눈에 확인하는 시민 서비스.</p>
            </div>
          </a>
        </section>
      </aside>
    </div>
  </main>
</body>
</html>
