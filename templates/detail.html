<!DOCTYPE html>
<html class="light" lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>{{ post.title }}</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>
<body class="bg-[#fff8f7] font-['Inter'] text-[#291716] selection:bg-[#bb0026] selection:text-white">
  <div class="fixed top-0 left-0 w-[35%] h-1 bg-[#bb0026] z-50"></div>

  <nav class="bg-white sticky top-0 z-40 border-b-2 border-gray-100">
    <div class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto">
      <div class="flex items-center gap-4">
        <span class="inline-flex items-center gap-2 rounded border border-[#e7bdbb] bg-[#fff0ef] px-2 py-1">
          <img src="{{ url_for('static', filename='img/seoul-logo.svg') }}" alt="서울특별시 로고" class="h-7 w-auto" loading="eager"/>
          <span class="text-xs font-semibold text-[#2563eb]">서울특별시</span>
        </span>
        <a class="text-2xl font-black italic tracking-tighter text-[#EF233C]" href="{{ url_for('post_list') }}">RED_EDIT</a>
      </div>
      <a class="hidden md:block bg-[#bb0026] text-white px-6 py-2 text-xs font-semibold uppercase tracking-widest hover:bg-[#e51936]" href="{{ url_for('post_new') }}">Write</a>
    </div>
  </nav>

  <main class="w-full pt-16 pb-16">
    <div class="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-12 gap-6">
      <article class="md:col-span-8 max-w-[760px]">
        <header class="mb-10">
          <div class="flex items-center gap-2 mb-6">
            <span class="bg-[#fcdbd9] text-[#5d3f3e] px-3 py-1 text-xs font-semibold uppercase rounded">Post</span>
            <span class="text-[#5d3f3e] text-xs font-semibold">{{ post.created_at }}</span>
          </div>

          <h1 class="font-['Work_Sans'] text-[48px] leading-[1.1] tracking-[-0.02em] font-bold mb-6">{{ post.title }}</h1>
        </header>

        <section class="mb-12">
          {% if post.image_path %}
          <img src="{% if post.image_path.startswith('http') %}{{ post.image_path }}{% else %}{{ url_for('static', filename=post.image_path) }}{% endif %}" alt="게시글 이미지" class="w-full max-h-[420px] object-cover border border-[#e7bdbb] mb-6"/>
          {% endif %}
          <div class="space-y-4 text-[18px] leading-[1.8] text-[#5d3f3e] whitespace-pre-wrap">{{ post.content }}</div>
        </section>

        <section class="border-t-2 border-[#bb0026] pt-8 mt-12 flex items-center justify-between gap-4">
          <div class="flex items-center gap-2">
            <a class="inline-flex items-center gap-1 bg-[#bb0026] text-white px-4 py-2 text-xs font-semibold uppercase tracking-widest hover:bg-[#e51936] transition-all" href="{{ url_for('post_edit', post_id=post.id) }}">
              수정
            </a>
            <form method="post" action="{{ url_for('post_delete', post_id=post.id) }}" onsubmit="return confirm('정말 삭제할까요?');">
              <button type="submit" class="inline-flex items-center gap-1 border-2 border-[#bb0026] text-[#bb0026] px-4 py-2 text-xs font-semibold uppercase tracking-widest hover:bg-[#ffe9e7] transition-all">
                삭제
              </button>
            </form>
          </div>

          <a class="flex items-center gap-1 text-slate-600 hover:text-[#bb0026] text-xs font-semibold uppercase tracking-widest transition-all" href="{{ url_for('post_list') }}">
            <span class="material-symbols-outlined">arrow_back</span>
            Back to List
          </a>
        </section>
      </article>

      <aside class="md:col-span-4 flex flex-col gap-6">
        <section class="md:sticky md:top-24 self-start border border-[#e7bdbb] bg-white p-4">
          <p class="text-[10px] font-semibold uppercase tracking-widest text-slate-400 mb-2">Advertisement</p>
          <a href="#" class="block hover:opacity-95 transition-opacity">
            <img
              src="https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=900&q=80"
              alt="광고 배너"
              class="w-full h-40 object-cover border border-[#e7bdbb]"
              loading="lazy"
            />
            <div class="mt-3">
              <h4 class="font-['Work_Sans'] text-lg font-bold leading-tight text-[#291716]">서울시 통합 민원 플랫폼 안내</h4>
              <p class="mt-1 text-sm text-[#596578]">민원 신청, 처리 조회, 알림 서비스를 한 번에 이용하세요.</p>
            </div>
          </a>
        </section>
      </aside>
    </div>
  </main>
</body>
</html>
